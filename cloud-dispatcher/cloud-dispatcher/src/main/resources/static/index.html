<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto-Scaling Cloud Dispatcher</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 550px; width: 100%; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .ai-badge { display: inline-block; background: #8e44ad; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; font-weight: bold; letter-spacing: 0.5px; }
        input { padding: 12px; width: 80%; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 20px; text-align: center; }
        button { background: #2c3e50; color: white; border: none; padding: 14px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; width: 85%; font-weight: bold; }
        button:hover { background: #1a252f; transform: translateY(-2px); }
        #resultCard { margin-top: 30px; padding: 20px; background: #fdf2e9; border-left: 5px solid #d35400; border-radius: 4px; display: none; text-align: left; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #8e44ad; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-badge">🧠 ML Auto-Scaling Engine Active</div>
    <h1>Cloud Dispatcher</h1>
    <p style="color: #7f8c8d; margin-bottom: 25px;">Enter the <b>Hour of the Day (0-23)</b> to predict traffic and auto-scale infrastructure.</p>

    <input type="number" id="hourInput" placeholder="e.g., 12 (for Noon)" min="0" max="23">
    <button onclick="runSimulation()">Run Intelligent Simulation</button>

    <div class="loader" id="loader"></div>

    <div id="resultCard">
        <h3 style="margin-top:0; color: #d35400;">System Execution Report</h3>
        <p id="resultText" style="line-height: 1.6; font-size: 15px; font-family: monospace;"></p>
    </div>
</div>

<script>
    function runSimulation() {
        // Get the hour from the input box, default to 12 (Noon) if empty
        const hour = document.getElementById('hourInput').value || 12;
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const resultText = document.getElementById('resultText');

        // Show loading spinner
        loader.style.display = 'block';
        resultCard.style.display = 'none';

        // THE FIX: We are now sending 'hourOfDay' to Spring Boot instead of 'tasks'
        fetch(`/api/dispatch?hourOfDay=${hour}`)
            .then(response => response.text())
            .then(data => {
                loader.style.display = 'none';
                resultCard.style.display = 'block';
                resultText.innerText = data; // Display the string from Java
            })
            .catch(error => {
                loader.style.display = 'none';
                alert("Error connecting to the Spring Boot server! Check your IntelliJ console.");
            });
    }
</script>

</body>
</html>
